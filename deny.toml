# cargo-deny configuration. Runs in CI; breaks the build on advisories,
# disallowed licenses, or unexpected dependency sources.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses accepted for dependencies. Our own crates are private
# (publish = false) and carry no license field yet, so they are ignored below.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
